
spring.application.name=demo

spring.datasource.url=jdbc:postgresql://localhost:5432/fittrack_db
spring.datasource.username=postgres

spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
# External AI API Configuration
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=
gemini.api.key=${GEMINI_API_KEY}

# JWT secret (recommended to set via environment variable JWT_SECRET)
# Example: set JWT_SECRET in your shell or CI and it will be picked up here
jwt.secret=${JWT_SECRET}
